seed: 42
output_dir: outputs
model:
  lm_name: HuggingFaceTB/SmolLM2-360M-Instruct
  d_lm: 960
  v_txt: 49152
data:
  n_per_class: 1000
  alpaca_n: 1000
vqvae:
  k: 256
  d: 64
  beta: 0.25
  batch_size: 64
  epochs: 80
  lr: 0.0003
