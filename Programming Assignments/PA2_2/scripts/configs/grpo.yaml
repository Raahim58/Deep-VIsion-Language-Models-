# ── GRPO ───────────────────────────────────────────────────────────────────
method: "grpo"
dataset: "Anthropic/hh-rlhf"
dataset_split: "harmless-base"

update_steps: 200
prompts_per_step: 8
K: 4                     # rollouts per prompt
max_new_tokens: 128

lr: 1.0e-5
beta: 0.1                # KL coefficient
epsilon: 0.2             # clipping ε

temperature: 0.7
top_p: 0.9

log_every: 5
eval_every: 25
save_checkpoint: true
